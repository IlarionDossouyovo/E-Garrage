<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Support | E-GARRAGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --neon-blue: #00d4ff;
      --neon-green: #00ff88;
      --premium: #ffd700;
      --dark: #0a0a0f;
      --dark-secondary: #12121a;
      --dark-card: #1a1a24;
      --border: #2a2a3a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
    body { background: var(--dark); color: #fff; height: 100vh; display: flex; flex-direction: column; }
    
    /* Header */
    .chat-header {
      background: var(--dark-secondary);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; }
    .chat-header h2 span { color: var(--neon-blue); }
    .agent-status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--neon-green); }
    .agent-dot { width: 10px; height: 10px; background: var(--neon-green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    /* Messages */
    .chat-messages {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 75%;
      padding: 1rem 1.2rem;
      border-radius: 16px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message.bot { background: var(--dark-card); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
    .message.user { background: linear-gradient(135deg, var(--neon-blue), #0099cc); color: var(--dark); align-self: flex-end; border-bottom-right-radius: 4px; }
    
    .message-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .message-avatar { width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
    .message.bot .message-avatar { background: var(--neon-blue); }
    .message.user .message-avatar { background: var(--dark); }
    .message-time { font-size: 0.7rem; color: #8892a0; }
    .message.user .message-time { color: rgba(0,0,0,0.5); }
    
    /* Typing Indicator */
    .typing { display: none; padding: 1rem; background: var(--dark-card); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; max-width: 100px; }
    .typing.show { display: block; }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dot { width: 8px; height: 8px; background: var(--neon-blue); border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-10px); } }
    
    /* Quick Actions */
    .quick-actions { display: flex; gap: 0.5rem; padding: 0.5rem 1.5rem; flex-wrap: wrap; }
    .quick-btn { padding: 0.4rem 0.8rem; background: var(--dark-card); border: 1px solid var(--border); border-radius: 20px; color: #8892a0; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
    .quick-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
    
    /* Input */
    .chat-input {
      background: var(--dark-secondary);
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .chat-input input {
      flex: 1;
      padding: 1rem;
      background: var(--dark-card);
      border: 2px solid var(--border);
      border-radius: 30px;
      color: #fff;
      font-size: 1rem;
      font-family: 'Rajdhani', sans-serif;
    }
    .chat-input input:focus { outline: none; border-color: var(--neon-blue); }
    .chat-input button {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-green));
      border: none;
      border-radius: 50%;
      color: var(--dark);
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .chat-input button:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0, 212, 255, 0.5); }
    .chat-input .icon-btn {
      width: 40px;
      height: 40px;
      background: var(--dark-card);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: #8892a0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-input .icon-btn:hover { color: var(--neon-blue); border-color: var(--neon-blue); }
    
    /* AI Toggle */
    .ai-toggle {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-green));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 30px rgba(0, 212, 255, 0.5);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    
    /* Minimized */
    .chat-minimized {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 300px;
      background: var(--dark-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      cursor: pointer;
    }
    .chat-minimized.show { display: block; }
    .chat-minimized h4 { font-family: 'Orbitron', sans-serif; margin-bottom: 0.5rem; }
    .chat-minimized p { color: #8892a0; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="chat-header">
    <h2>E-<span>GARRAGE</span> Support</h2>
    <div class="agent-status">
      <span class="agent-dot"></span>
      <span>AI Assistant Online</span>
    </div>
  </div>
  
  <div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('order status')">📦 Order Status</button>
    <button class="quick-btn" onclick="sendQuick('products')">🛒 Products</button>
    <button class="quick-btn" onclick="sendQuick('return')">↩️ Returns</button>
    <button class="quick-btn" onclick="sendQuick('shipping')">🚚 Shipping</button>
    <button class="quick-btn" onclick="sendQuick('contact')">📞 Contact</button>
  </div>
  
  <div class="chat-messages" id="messages">
    <div class="message bot">
      <div class="message-header">
        <div class="message-avatar">🤖</div>
        <span style="font-weight:600;">E-GARRAGE AI</span>
        <span class="message-time">Just now</span>
      </div>
      Hello! I'm your AI assistant. How can I help you today?
    </div>
    
    <div class="typing" id="typing">
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>
  
  <div class="chat-input">
    <button class="icon-btn" onclick="toggleVoice()" title="Voice Input">🎤</button>
    <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">➤</button>
  </div>
  
  <div class="ai-toggle" onclick="toggleChat()" title="Toggle Chat">💬</div>
  
  <script>
    const messagesEl = document.getElementById('messages');
    const typingEl = document.getElementById('typing');
    const inputEl = document.getElementById('userInput');
    
    // AI Responses
    const responses = {
      'order': "To check your order status, please visit /track or provide your order number. You can also view all your orders in your profile at /profile",
      'products': "Browse our products at / - We have Electronics, Accessories, and more! Use filters to find exactly what you need.",
      'return': "Returns accepted within 30 days. Visit /contact to initiate a return. Our team will process it within 48 hours.",
      'shipping': "We offer worldwide shipping! Standard delivery takes 5-10 days. Express shipping available at checkout.",
      'contact': "Contact us: Email hello@egarrage.com, Phone +1-800-E-GARRAGE, or visit /contact for our form.",
      'help': "I can help with: orders, products, returns, shipping, account, and more. What do you need?",
      'default': "Thank you for contacting E-GARRAGE! How can I assist you today? Browse products at / or check order status at /track"
    };
    
    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }
    
    function sendQuick(text) {
      inputEl.value = text;
      sendMessage();
    }
    
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      
      // Add user message
      addMessage(text, 'user');
      inputEl.value = '';
      
      // Show typing
      typingEl.classList.add('show');
      scrollToBottom();
      
      // Simulate AI processing
      await new Promise(r => setTimeout(1500));
      typingEl.classList.remove('show');
      
      // Generate response
      const response = generateResponse(text);
      addMessage(response, 'bot');
    }
    
    function generateResponse(text) {
      const lower = text.toLowerCase();
      
      for (const [key, value] of Object.entries(responses)) {
        if (lower.includes(key)) return value;
      }
      return responses.default;
    }
    
    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = `
        <div class="message-header">
          <div class="message-avatar">${type === 'bot' ? '🤖' : '👤'}</div>
          <span style="font-weight:600;">${type === 'bot' ? 'E-GARRAGE AI' : 'You'}</span>
          <span class="message-time">${new Date().toLocaleTimeString()}</span>
        </div>
        ${text}
      `;
      messagesEl.appendChild(msg);
      scrollToBottom();
    }
    
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    function toggleVoice() {
      alert('Voice input would start here (requires browser permissions)');
    }
    
    function toggleChat() {
      alert('Chat window toggled');
    }
  </script>
</body>
</html>
