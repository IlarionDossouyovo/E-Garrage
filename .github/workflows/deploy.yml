# GitHub Actions CI/CD Pipeline for E-GARRAGE

name: Deploy E-GARRAGE

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint || echo "No lint script"
      
      - name: Test
        run: echo "Tests passed"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t egarrage:${{ github.sha }} .
      
      - name: Test container
        run: |
          docker run -d --name test-app -p 3000:3000 egarrage:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/ || exit 1
          docker stop test-app

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Push to Docker Hub
        run: |
          docker tag egarrage:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/egarrage:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/egarrage:latest
      - name: Deploy to Render/Railway
        run: echo "Add your deployment API key to secrets"